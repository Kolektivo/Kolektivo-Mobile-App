name: iOS Fastlane Release 🚀

on:
  push:
    tags:
      - 'v*' # Run only on version tags like v1.0.0, v2.3.4
    branches:
      - '@noah/fastlane-ios-integration'

  workflow_dispatch: # Allows manual triggering

jobs:
  release:
    name: Build & Deploy iOS App
    runs-on: macos-13 # Use macOS runner with Xcode 15.2

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode 15.2
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Install Project Dependencies (Ensure `node_modules` exists)
        run: yarn install --frozen-lockfile

      - name: Install iOS Dependencies (Run `pod install`)
        run: |
          cd ios
          bundle install
          bundle exec pod install
          cd ..

      ### ✅ Cache Bundler (Ruby Gems) ###
      - name: Cache Bundler
        uses: actions/cache@v3
        with:
          path: vendor/bundle
          key: bundler-${{ runner.os }}-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            bundler-${{ runner.os }}-

      - name: Install Ruby, Bundler & CocoaPods
        run: |
          gem install bundler cocoapods
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 4 --retry 3

      ### ✅ Cache CocoaPods ###
      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: ios/Pods
          key: cocoapods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            cocoapods-${{ runner.os }}-

      - name: Install CocoaPods Dependencies
        run: |
          cd ios
          bundle exec pod install
          cd ..

      ### ✅ Cache Node Modules ###
      - name: Cache Yarn Dependencies
        uses: actions/cache@v3
        with:
          path: node_modules
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install Node.js and Yarn
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install Project Dependencies
        run: yarn install --frozen-lockfile

      - name: Start Development Server
        run: yarn dev:ios & # Runs in background

      ### ✅ Cache Provisioning Profiles (Match) ###
      - name: Cache Match Profiles
        uses: actions/cache@v3
        with:
          path: ~/Library/MobileDevice/Provisioning Profiles
          key: match-${{ runner.os }}-${{ hashFiles('fastlane/Matchfile') }}
          restore-keys: |
            match-${{ runner.os }}-

      - name: Fetch Signing Certificates & Profiles
        run: fastlane match appstore

      - name: Set up Fastlane Environment Variables
        run: |
          echo "FASTLANE_USER=${{ secrets.FASTLANE_USER }}" >> $GITHUB_ENV
          echo "FASTLANE_PASSWORD=${{ secrets.FASTLANE_PASSWORD }}" >> $GITHUB_ENV
          echo "MATCH_PASSWORD=${{ secrets.MATCH_PASSWORD }}" >> $GITHUB_ENV
          echo "FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT=60" >> $GITHUB_ENV
          echo "FASTLANE_XCODEBUILD_SETTINGS_RETRIES=6" >> $GITHUB_ENV

      - name: Clear Xcode Derived Data
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Run Fastlane for TestFlight Upload 🚀
        run: fastlane ios mainnet

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Build
          path: build/*.ipa
